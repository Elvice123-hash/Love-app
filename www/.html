<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love App Global</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#ff0066">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <meta name="mobile-web-app-capable" content="yes">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: Arial, sans-serif; 
      background: linear-gradient(135deg, #ff0066, #ff6b9d);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .container { 
      background: rgba(0,0,0,0.3); 
      padding: 30px; 
      border-radius: 20px; 
      text-align: center;
      max-width: 400px;
      width: 90%;
      backdrop-filter: blur(10px);
    }
    h1 { font-size: 2rem; margin-bottom: 10px; }
    .lock { font-size: 4rem; margin: 20px 0; }
    input { 
      width: 100%; 
      padding: 15px; 
      border: none; 
      border-radius: 10px; 
      margin: 10px 0;
      font-size: 1rem;
      text-align: center;
    }
    button { 
      width: 100%; 
      padding: 15px; 
      border: none; 
      border-radius: 10px; 
      background: #fff; 
      color: #ff0066;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      margin: 10px 0;
    }
    .app-features { display: none; }
    .feature-btn {
      background: rgba(255,255,255,0.2);
      border: 2px solid white;
      color: white;
      margin: 10px 0;
    }
    .pay-info {
      background: rgba(255,255,0,0.2);
      padding: 15px;
      border-radius: 10px;
      margin: 15px 0;
      border: 1px solid yellow;
    }
    .error { color: #ffeb3b; margin: 10px 0; }
  </style>
</head>
<body>
  <!-- LOCK SCREEN -->
  <div class="container" id="lockScreen">
    <div class="lock">🔒</div>
    <h1>Love App Global</h1>
    <p>Premium Dating & Calls</p>
    
    <div class="pay-info">
      <strong>LIPA KUFUNGUA APP</strong><br>
      M-Pesa: 254116624621<br>
      Kiasi: Ksh 200<br>
      Baada ya kulipa, tuma WhatsApp
    </div>
    
    <a href="https://wa.me/254116624621?text=Nimelipa%20Love%20App.%20Naomba%20code" target="_blank">
      <button>Lipa Sasa Via WhatsApp</button>
    </a>
    
    <input type="text" id="codeInput" placeholder="Weka Code Hapa">
    <button onclick="unlockApp()">Fungua App</button>
    <p class="error" id="errorMsg"></p>
  </div>

  <!-- APP ILIYOFUNGULIWA -->
  <div class="container app-features" id="appScreen">
    <h1>❤️ Karibu Love App</h1>
    <p>App Imeshafunguliwa!</p>
    
    <button class="feature-btn" onclick="startVideoCall()">📹 Video Call</button>
    <button class="feature-btn" onclick="startAudioCall()">📞 Audio Call</button>
    <button class="feature-btn" onclick="openChat()">💬 Chat</button>
    <button class="feature-btn" onclick="findMatch()">💕 Tafuta Match</button>
    <button class="feature-btn" onclick="logout()">🚪 Toka</button>
  </div>

  <script>
    // BADILISHA CODE HAPA UKITAKA
    const SECRET_CODE = "LOVE2026";
    
    if(localStorage.getItem('appUnlocked') === 'yes'){
      showApp();
    }

    function unlockApp(){
      const code = document.getElementById('codeInput').value.trim();
      if(code === SECRET_CODE){
        localStorage.setItem('appUnlocked', 'yes');
        showApp();
      } else {
        document.getElementById('errorMsg').innerText = 'Code sio sahihi! Lipa kwanza.';
      }
    }

    function showApp(){
      document.getElementById('lockScreen').style.display = 'none';
      document.getElementById('appScreen').style.display = 'block';
    }

    function logout(){
      localStorage.removeItem('appUnlocked');
      location.reload();
    }

    function startVideoCall(){
      alert('📹 Video Call Inaanza...\n\nTutaanika ZegoCloud hapa baadaye');
    }
    
    function startAudioCall(){
      alert('📞 Audio Call Inaanza...\n\nTutaanika ZegoCloud hapa baadaye');
    }
    
    function openChat(){
      alert('💬 Chat Inafunguka...\n\nTutaanika Firebase hapa baadaye');
    }
    
    function findMatch(){
      alert('💕 Tunatafuta Match...\n\nOngeza database hapa baadaye');
    }
  </script>
</body>
</html>
