<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Days</title>
  <style>
    body { 
      background: linear-gradient(135deg, #ff758c, #ff7eb3); 
      color: white; font-family: system-ui, sans-serif; 
      text-align: center; margin: 0; height: 100vh; 
      display: flex; flex-direction: column; justify-content: center; padding: 20px;
    }
    h1 { font-size: 2rem; margin-bottom: 5px; }
    #days { font-size: 4rem; font-weight: bold; margin: 20px 0; }
    #date { font-size: 1rem; opacity: 0.9; }
    input, button { 
      padding: 12px; border: none; border-radius: 10px; 
      margin: 10px; font-size: 1rem; 
    }
    button { background: white; color: #ff758c; font-weight: bold; }
  </style>
</head>
<body>
  <h1>❤️ We've been together</h1>
  <div id="days">0</div>
  <p>Days of Love</p>
  <p id="date"></p>
  <input type="date" id="startDate">
  <button onclick="setDate()">Set Anniversary</button>
  
  <script>
    function setDate() {
      const date = document.getElementById('startDate').value;
      if(date) {
        localStorage.setItem('loveDate', date);
        updateDays();
      }
    }
    
    function updateDays() {
      const saved = localStorage.getItem('loveDate');
      if(saved) {
        const start = new Date(saved);
        const today = new Date();
        const diff = Math.floor((today - start) / (1000 * 60 * 60 * 24));
        document.getElementById('days').innerText = diff;
        document.getElementById('date').innerText = `Since ${start.toDateString()}`;
        document.getElementById('startDate').value = saved;
      }
    }
    updateDays();
  </script>
</body>
</html>
